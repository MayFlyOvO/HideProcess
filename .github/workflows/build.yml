name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Apply Tag Version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+(?:\.\d+)?)$') {
            throw "Invalid tag format '$tag'. Expected: v1.2.3 or v1.2.3.4"
          }

          $version = $Matches['version']
          [xml]$xml = Get-Content ".\build\Version.props"
          if ($null -eq $xml.Project -or $null -eq $xml.Project.PropertyGroup -or $null -eq $xml.Project.PropertyGroup.AppVersion) {
            throw "build/Version.props does not contain Project/PropertyGroup/AppVersion."
          }

          $xml.Project.PropertyGroup.AppVersion = $version
          $xml.Save((Resolve-Path ".\build\Version.props"))
          Write-Host "Using release version: $version"

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress

      - name: Build Packages
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File ".\Build-App.ps1"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bosskey-win-x64
          path: |
            artifacts/publish/**
            artifacts/singlefile/BossKey-SingleFile.exe
            artifacts/singlefile/BossKey-SingleFile.exe.config
            artifacts/installer/BossKey-Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/singlefile/BossKey-SingleFile.exe
            artifacts/singlefile/BossKey-SingleFile.exe.config
            artifacts/installer/BossKey-Setup.exe
