name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore BossKey.sln

      - name: Build
        run: dotnet build BossKey.sln -c Release --no-restore

      - name: Publish Multi-File (self-contained)
        run: >
          dotnet publish .\BossKey.App\BossKey.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:UpdateChannel=installer
          -p:DebugType=None
          -p:DebugSymbols=false
          -o .\artifacts\publish

      - name: Publish Single-File (self-contained)
        run: >
          dotnet publish .\BossKey.App\BossKey.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:UpdateChannel=singlefile
          -p:DebugType=None
          -p:DebugSymbols=false
          -o .\artifacts\singlefile

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y --no-progress

      - name: Build Installer
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found after installation."
          }

          & $iscc `
            "/DSourceDir=$pwd\artifacts\publish" `
            "/DSourceIcon=$pwd\BossKey.App\Assets\BossKey.ico" `
            "/DOutputDir=$pwd\artifacts\installer" `
            "$pwd\installer\BossKey.iss"

      - name: Prepare Release Assets
        shell: powershell
        run: |
          Copy-Item ".\artifacts\singlefile\BossKey.App.exe" ".\artifacts\singlefile\BossKey-SingleFile.exe" -Force

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bosskey-win-x64
          path: |
            artifacts/publish/**
            artifacts/singlefile/BossKey-SingleFile.exe
            artifacts/installer/BossKey-Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/singlefile/BossKey-SingleFile.exe
            artifacts/installer/BossKey-Setup.exe
